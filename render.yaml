services:
  - type: web
    name: projeto-i9
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: projeto-i9-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: projeto-i9-db
